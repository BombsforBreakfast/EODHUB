<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>EOD-Hub</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: #e5e5e5;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <p>Loading EOD-Hub…</p>
    <script>
      // Bundled fallback only — remote server.url is primary. Recover if config is missing.
      (function () {
        var origin = "https://eod-hub.com";
        console.info("[EOD-Hub shell] local fallback loading", origin);
        window.location.replace(origin + "/");
      })();
    </script>
  </body>
