# EOD-Hub iOS — cloud Mac builds (no local Mac required).
# Setup: docs/ios-app-store-setup.md

workflows:
  eod-hub-ios:
    name: EOD-Hub iOS TestFlight
    integrations:
      app_store_connect: eodhub-asc
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.eodhub.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        CAPACITOR_SERVER_URL: https://eod-hub.com
      node: 20
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Ensure iOS platform exists
        script: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Set production server URL in Capacitor config
        script: |
          node scripts/patch-capacitor-server-url.mjs
          npx cap sync ios
          node scripts/verify-capacitor-ios-config.mjs
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($BUILD_NUMBER))
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build ipa for App Store
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  eod-hub-android:
    name: EOD-Hub Android Internal
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      android_signing:
        - eodhub_android_keystore
      vars:
        PACKAGE_NAME: com.eodhub.app
        CAPACITOR_SERVER_URL: https://eod-hub.com
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Ensure Android platform exists
        script: |
          if [ ! -d android/app ]; then
            npx cap add android
          fi
      - name: Sync Capacitor Android
        script: npx cap sync android
      - name: Set production server URL in Capacitor config
        script: |
          node scripts/patch-capacitor-server-url.mjs
          npx cap sync android
          node scripts/verify-capacitor-android-config.mjs
      - name: Build Android App Bundle
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
